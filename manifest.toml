#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "animarr"
name = "Animarr"
description.en = "Smart Torznab proxy for Anime metadata resolution"
description.fr = "Proxy Torznab intelligent pour la résolution de métadonnées d'Anime"

version = "1.2.1~ynh1"
maintainers = ["wiwileborne"]

[upstream]
license = "MIT"
code = "https://github.com/wiwileborne/Animarr"

[integration]
yunohost = ">= 11.0"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = true
ldap = "not_relevant"
sso = "not_relevant"
disk = "100M"
ram.build = "50M"
ram.runtime = "100M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/animarr"

    [install.init_main_permission]
    type = "group"
    default = "admins"

[resources]
    [resources.system_user]
    
    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 5000

    [resources.sources.main]
    # Architecture detection handled by YunoHost
    amd64.url = "https://github.com/wiwileborne/Animarr/releases/download/v1.2.1/animarr-linux-x64.zip"
    amd64.sha256 = "a7cddfe5150896b061fb00806adbe9d501a73bf3aac48354fda3669dbbf80e49"
    arm64.url = "https://github.com/wiwileborne/Animarr/releases/download/v1.2.1/animarr-linux-arm64.zip"
    arm64.sha256 = "8a4228c1db8ef8c6e9c366c63e29b3e8d6428c51a53360312c7e82d888a2286e"
    # The zip contains a 'release' folder
    in_subdir = "release"
